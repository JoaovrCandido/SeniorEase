name: CI - SeniorEase

# Define quando este "robô" vai rodar
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-build:
    name: Testes e Validação
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar o repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão estável mais recente
          cache: 'npm' # Acelera a instalação nas próximas vezes

      - name: 📦 Instalar dependências
        run: npm ci # 'ci' é melhor que 'install' no servidor, pois respeita o package-lock à risca

      - name: 🕵️ Verificar Tipagem (TypeScript)
        # Garante que não há erros de tipos (como um 'any' escondido) antes de testar
        run: npx tsc --noEmit

      - name: 🧪 Correr Testes (Vitest)
        # O GitHub Actions injeta automaticamente a variável de ambiente CI=true
        # O Vitest é inteligente: ao ver CI=true, ele roda os testes uma vez e para (em vez de ficar no modo "watch")
        run: npm run test

      - name: 🏗️ Testar Build do Next.js
        # Garante que o projeto compila perfeitamente para produção
        run: npm run build